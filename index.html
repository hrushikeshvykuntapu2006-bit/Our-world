<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our World 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b81">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ffd6e0,#e0c3fc);
  overflow-x:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#ff6b81;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:28px;
  z-index:9999;
}

/* LOCK */
#lockScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9998;
}

.lockBox{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
}

input,button{
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#ff6b81;
  color:white;
}

/* CARD */
.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.2);
}

/* GALLERY */
.gallery{
  display:flex;
  overflow-x:auto;
  gap:10px;
}
.gallery img{
  width:150px;
  border-radius:15px;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:black;
}
#viewer img{
  width:90%;
}

/* DARK */
.dark{
  background:#111;
  color:white;
}

/* BUTTON */
.toggle{
  position:fixed;
  top:10px;
  right:10px;
}
</style>
</head>

<body>

<div id="splash">💖 Our World</div>

<div id="lockScreen">
  <div class="lockBox">
    <h2>Unlock 💖</h2>
    <input type="password" id="password">
    <button onclick="unlock()">Enter</button>
  </div>
</div>

<button class="toggle" onclick="toggleDark()">🌙</button>

<section><h1>💖 Our World 💖</h1></section>

<section>
<div class="card" id="time"></div>
</section>

<section>
<h2>📸 Memories</h2>
<div class="gallery">
<img src="photo01.jpg" onclick="view(this)">
