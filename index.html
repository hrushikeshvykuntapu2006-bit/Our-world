<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
}

/* Sections */
section{
  padding:40px 20px;
  animation: fadeIn 1s ease;
}

/* Fade animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Headings */
h1,h2{
  margin-bottom:20px;
}

/* Scroll Gallery */
.gallery, .movies{
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:10px;
}

/* Portrait Images */
.gallery img, .movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  transition:0.3s;
  cursor:pointer;
}

.gallery img:hover, .movies img:hover{
  transform:scale(1.05);
}

/* Music */
.music{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

/* Card */
.card{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

iframe{
  border-radius:12px;
}

/* Fullscreen Image */
#viewer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#viewer img{
  max-width:90%;
  max-height:90%;
  border-radius:20px;
}

/* Floating hearts */
.heart{
  position:fixed;
  color:red;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-600px); opacity:0;}
}

/* Gift button */
button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff6b81;
  color:white;
  font-size:16px;
  cursor:pointer;
}

</style>
</head>

<body>

<section>
<h1>💖 Our World 💖</h1>
<p>Everything about us ✨</p>
</section>

<section>
<h2>📸 Memories</h2>
<div class="gallery">
<img src="photo01.jpg" onclick="openViewer(this)">
<img src="photo02.jpg" onclick="openViewer(this)">
<img src="photo03.jpg" onclick="openViewer(this)">
</div>
</section>

<section>
<h2>🎬 Our Favourite Movies</h2>
<div class="movies">
<img src="movie01.jpg" onclick="openViewer(this)">
<img src="movie02.jpg" onclick="openViewer(this)">
<img src="movie03.jpg" onclick="openViewer(this)">
<img src="movie04.jpg" onclick="openViewer(this)">
</div>
</section>

<section>
<h2>🎵 Our Songs</h2>
<div class="music">

<div class="card">
<iframe src="https://open.spotify.com/embed/track/3hB9lDLyAClYVZivMMl20N" width="100%" height="100"></iframe>
</div>

<div class="card">
<iframe src="https://open.spotify.com/embed/track/7FwYs4qSJCJi2Hd6ZV8Q3M" width="100%" height="100"></iframe>
</div>

<div class="card">
<iframe src="https://open.spotify.com/embed/track/1nH2PkJL1XoUq8oE6tBZoU" width="100%" height="100"></iframe>
</div>

</div>
</section>

<section>
<h2>💌 For You</h2>
<div class="card">
Hey my love 💖<br><br>
Every moment with you feels special ✨  
This is just a small piece of how much you mean to me ❤️
<br><br>
<button onclick="showGift()">Open 🎁</button>
</div>
</section>

<section>
<h2>⏳ Our Time</h2>
<div class="card" id="time"></div>
</section>

<!-- Fullscreen Viewer -->
<div id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<script>
/* Time Counter */
const startDate=new Date("2020-05-13");

setInterval(()=>{
  const now=new Date();
  const diff=now-startDate;
  const days=Math.floor(diff/(1000*60*60*24));
  document.getElementById("time").innerText=days+" days together 💖";
},1000);

/* Image Viewer */
function openViewer(img){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=img.src;
}

function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

/* Floating Hearts */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"%";
  heart.style.fontSize=(Math.random()*20+15)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),4000);
},800);

/* Gift */
function showGift(){
  alert("You are my favorite person 💖✨");
}
</script>

</body>
</html>
