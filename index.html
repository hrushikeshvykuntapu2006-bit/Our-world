<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
  -webkit-overflow-scrolling: touch;
}

html{scroll-behavior:smooth;}

/* 🌸 LOCKSCREEN PASTEL */
#lockScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc,#c2f0ff);
}

.lockBox{
  padding:38px;
  border-radius:28px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(55px);
  -webkit-backdrop-filter: blur(55px);
  border:1px solid rgba(255,255,255,0.35);
  box-shadow:0 25px 60px rgba(0,0,0,0.18);
  text-align:center;
}

.lockIcon{
  font-size:42px;
  margin-bottom:10px;
}

.lockBox input{
  width:220px;
  padding:12px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  text-align:center;
  background:rgba(255,255,255,0.4);
}

.lockBox button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:16px;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  cursor:pointer;
}

/* SECTIONS */
section{padding:40px 20px;}

/* GALLERY */
.gallery,.movies{
  display:flex;
  overflow-x:auto;
  gap:20px;
  scroll-snap-type:x mandatory;
  padding:10px;
}

.gallery img,.movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
}

/* CARD */
.card{
  padding:20px;
  border-radius:22px;
  max-width:400px;
  margin:auto;
  backdrop-filter: blur(35px);
  background: rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.3);
}

/* 🎵 MUSIC */
.musicGrid{
  display:flex;
  flex-direction:column;
  gap:24px;
  align-items:center;
  padding:20px 10px;
}

.musicCard{
  width:90%;
  max-width:380px;   /* 🔥 reduced size */
  border-radius:28px;
  overflow:hidden;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(50px);
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.albumWrap{
  height:240px;  /* 🔥 reduced album size */
}

.album{
  width:100%;
  height:100%;
  object-fit:cover;
}

.musicCard iframe{
  width:100%;
  height:85px;
  border:none;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:90%;
  max-height:90%;
  border-radius:20px;
}

/* HEARTS */
.heart{
  position:fixed;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<!-- 🌸 LOCK -->
<div id="lockScreen">
  <div class="lockBox">
    <div class="lockIcon">🔐</div>
    <h2>Our World</h2>
    <p>Enter password</p>
    <input type="password" id="password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<section><h1>💖 Our World 💖</h1></section>

<!-- 📸 PHOTOS (9) -->
<section>
<h2>📸 fav clicks</h2>
<div class="gallery">
<img src="photo01.jpg"><img src="photo02.jpg"><img src="photo03.jpg">
<img src="photo04.jpg"><img src="photo05.jpg"><img src="photo06.jpg">
<img src="photo07.jpg"><img src="photo08.jpg"><img src="photo09.jpg">
</div>
</section>

<!-- 🎬 MOVIES (9) -->
<section>
<h2>🎬 comfort Movies</h2>
<div class="movies">
<img src="movie01.jpg"><img src="movie02.jpg"><img src="movie03.jpg">
<img src="movie04.jpg"><img src="movie05.jpg"><img src="movie06.jpg">
<img src="movie07.jpg"><img src="movie08.jpg"><img src="movie09.jpg">
</div>
</section>

<!-- 🎵 MUSIC (Spotify API) -->
<section>
<h2>🎵 Our Music</h2>
<div class="musicGrid" id="musicGrid"></div>
</section>

<!-- 💌 OLD LETTER -->
<section>
<h2>💌 A Letter</h2>
<div class="card" onclick="startLetter()">
<div id="gift">🎁 Tap to Open</div>
<div id="text"></div>
</div>
</section>

<script>

/* LOCK */
function unlock(){
  if(document.getElementById("password").value==="2209"){
    document.getElementById("lockScreen").style.display="none";
  }else alert("Wrong 💔");
}

/* LETTER */
let i=0, started=false;
const msg=`hie pandu dhanaa,

I don’t really know how to express myself perfectly, but I want you to understand what I feel.

We’ve been together for so long 💖

Take care always 🫂

I love you ❤️`;

function startLetter(){
  if(started) return;
  started=true;
  document.getElementById("gift").style.display="none";
  let el=document.getElementById("text");

  function type(){
    if(i<msg.length){
      el.innerHTML += msg[i]==="\n"?"<br>":msg[i];
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

/* 🎵 SPOTIFY API (oEmbed) */
const tracks=[
"3vCzLB6kS2lGcIpm1OOUsy",
"6lanRgr6wXibZr8KgzXxBl",
"3hB9lDLyAClYVZivMMl20N",
"7FwYs4qSJCJi2Hd6ZV8Q3M",
"4QNSMIeCknaH5m0EM2yNTI"
];

async function loadMusic(){
  const grid=document.getElementById("musicGrid");

  for(let id of tracks){
    let res=await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/track/${id}`);
    let data=await res.json();

    let div=document.createElement("div");
    div.className="musicCard";

    div.innerHTML=`
      <div class="albumWrap">
        <img class="album" src="${data.thumbnail_url}">
      </div>
      <iframe src="https://open.spotify.com/embed/track/${id}"></iframe>
    `;

    grid.appendChild(div);
  }
}
loadMusic();

</script>

</body>
</html>
