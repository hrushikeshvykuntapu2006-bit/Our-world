<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
  -webkit-overflow-scrolling: touch;
}

html{scroll-behavior:smooth;}

/* 🌌 PARTICLES */
#particles{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  filter:blur(2px);
  animation:floatUp 12s linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(100vh);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* LOCK */
#lockScreen{
  position:fixed;
  inset:0;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.lockBox{
  padding:30px;
  border-radius:22px;
  backdrop-filter: blur(40px);
  background: rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.35);
}

/* SECTIONS */
section{padding:40px 20px;}

/* GALLERY + MOVIES */
.gallery,.movies{
  display:flex;
  overflow-x:auto;
  gap:20px;
  scroll-snap-type:x mandatory;
  padding:10px;
}
.gallery img,.movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  scroll-snap-align:center;
}

/* CARD */
.card{
  padding:20px;
  border-radius:22px;
  max-width:400px;
  margin:auto;
  backdrop-filter: blur(35px);
  background: rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.3);
}

/* MUSIC */
.musicGrid{
  display:flex;
  flex-direction:column;
  gap:28px;
  align-items:center;
  padding:25px 10px;
}

.musicCard{
  width:92%;
  max-width:440px;
  border-radius:32px;
  overflow:hidden;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(55px);
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 25px 60px rgba(0,0,0,0.22);
}

.albumWrap{height:300px;}
.album{
  width:100%;
  height:100%;
  object-fit:cover;
}
.glassOverlay{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.35),rgba(255,255,255,0.05));
}
.musicCard iframe{
  width:100%;
  height:92px;
  border:none;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

/* HEARTS */
.heart{
  position:fixed;
  animation:float 4s linear infinite;
}
@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<div id="particles"></div>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lockBox">
    <h2>💖 Enter Password</h2>
    <input type="password" id="password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<section><h1>💖 Our World 💖</h1></section>

<!-- PHOTOS (9) -->
<section>
<h2>📸 fav clicks</h2>
<div class="gallery">
<img src="photo01.jpg"><img src="photo02.jpg"><img src="photo03.jpg">
<img src="photo04.jpg"><img src="photo05.jpg"><img src="photo06.jpg">
<img src="photo07.jpg"><img src="photo08.jpg"><img src="photo09.jpg">
</div>
</section>

<!-- MOVIES (9) -->
<section>
<h2>🎬 comfort Movies</h2>
<div class="movies">
<img src="movie01.jpg"><img src="movie02.jpg"><img src="movie03.jpg">
<img src="movie04.jpg"><img src="movie05.jpg"><img src="movie06.jpg">
<img src="movie07.jpg"><img src="movie08.jpg"><img src="movie09.jpg">
</div>
</section>

<!-- MUSIC (AUTO SPOTIFY API STYLE) -->
<section>
<h2>🎵 Our Music</h2>
<div class="musicGrid" id="musicGrid"></div>
</section>

<!-- FUTURE -->
<section>
<h2>📅 Future Plans</h2>
<div class="card">
Travel ✈️<br>
Drives 🌙<br>
Anime 🎬<br>
Forever 💖<br>
Marriage 💍
</div>
</section>

<!-- LETTER -->
<section>
<h2>💌 A Letter</h2>
<div class="card" onclick="startLetter()">
<div id="gift">🎁 Tap to Open</div>
<div id="text"></div>
</div>
</section>

<!-- TIME -->
<section>
<h2>⏳ Time</h2>
<div class="card" id="time"></div>
</section>

<script>

/* LOCK */
function unlock(){
  if(document.getElementById("password").value==="password 🦋"){
    document.getElementById("lockScreen").style.display="none";
  }else alert("Wrong 💔");
}

/* HEARTS */
setInterval(()=>{
  if(document.hidden) return;
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},1200);

/* TIME */
const start=new Date("2020-05-09");
setInterval(()=>{
  let d=Math.floor((new Date()-start)/(1000*60*60*24));
  document.getElementById("time").innerText=d+" days 💖";
},1000);

/* LETTER */
let i=0, started=false;
const msg=`hie pandu dhanaa,

I love you ❤️`;

function startLetter(){
  if(started) return;
  started=true;
  document.getElementById("gift").style.display="none";
  let el=document.getElementById("text");

  function type(){
    if(i<msg.length){
      el.innerHTML += msg[i]==="\n"?"<br>":msg[i];
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

/* 🌌 PARTICLES */
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.getElementById("particles").appendChild(p);
}

/* 🎵 SPOTIFY AUTO FETCH (oEmbed) */
const tracks=[
"3vCzLB6kS2lGcIpm1OOUsy",
"6lanRgr6wXibZr8KgzXxBl",
"3hB9lDLyAClYVZivMMl20N",
"7FwYs4qSJCJi2Hd6ZV8Q3M",
"4QNSMIeCknaH5m0EM2yNTI"
];

async function loadMusic(){
  const grid=document.getElementById("musicGrid");

  for(let id of tracks){
    let res=await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/track/${id}`);
    let data=await res.json();

    let div=document.createElement("div");
    div.className="musicCard";

    div.innerHTML=`
      <div class="albumWrap">
        <img class="album" src="${data.thumbnail_url}">
      </div>
      <div class="glassOverlay"></div>
      <iframe src="https://open.spotify.com/embed/track/${id}"></iframe>
    `;

    grid.appendChild(div);
  }
}
loadMusic();

</script>

</body>
</html>
