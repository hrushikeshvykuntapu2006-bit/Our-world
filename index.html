<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
}

/* LOCK SCREEN */
#lockScreen{
  position:fixed;
  inset:0;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lockBox{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.lockBox input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  width:200px;
}

.lockBox button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:15px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
}

/* sections */
section{
  padding:40px 20px;
}

.gallery,.movies{
  display:flex;
  overflow-x:auto;
  gap:20px;
}

.gallery img,.movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
}

/* card */
.card{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
}

/* viewer */
#viewer{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:90%;
  max-height:90%;
}

/* hearts */
.heart{
  position:fixed;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}

/* cursor */
.cursor::after{
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* MUSIC UI */
.musicGrid{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.musicCard{
  position:relative;
  width:90%;
  max-width:400px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  transition:0.3s;
}

.musicGrid{
  display:flex;
  flex-direction:column;
  gap:28px;              /* BIG SPACE = premium feel */
  align-items:center;
  padding:20px 10px;
}

/* 🧊 iOS GLASS CARD */
  .musicGrid{
  display:flex;
  flex-direction:column;
  gap:35px;
  align-items:center;
  padding:25px 10px;
}

/* 🍏 iOS CARD */
.musicCard{
  position:relative;
  width:92%;
  max-width:430px;

  background:rgba(255,255,255,0.18);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  border-radius:28px;
  overflow:hidden;

  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 15px 40px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.4);

  transition:0.4s ease;
}

/* hover lift */
.musicCard:hover{
  transform:translateY(-6px) scale(1.02);
}

/* 🌫 album cover BIG */
.album{
  width:100%;
  height:280px;          /* BIG ALBUM COVER */
  object-fit:cover;
  border-radius:28px 28px 0 0;
}

/* glass layer */
.glassOverlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.05)
  );
  pointer-events:none;
}

/* 🎧 spotify player */
.musicCard iframe{
  width:100%;
  height:90px;
  border:none;
  position:relative;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lockBox">
    <h2>💖 Enter Password</h2>
    <input type="password" id="password" placeholder="2209">
    <br>
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<section>

<div class="musicGrid">

    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/3vCzLB6kS2lGcIpm1OOUsy"></iframe>
  </div>

    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/6lanRgr6wXibZr8KgzXxBl"></iframe>
  </div>

  <div class="musicCard">
    <img class="album" src="https://i.scdn.co/image/ab67616d0000b273000000000000000000000000">
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/3hB9lDLyAClYVZivMMl20N"></iframe>

  <div class="musicCard">
    <img class="album" src="https://i.scdn.co/image/ab67616d0000b273000000000000000000000000">
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/4QNSMIeCknaH5m0EM2yNTI"></iframe>
  </div>

</div>
</section>

<!-- FUTURE -->
<section>
<h2>📅 Future Plans</h2>
<div class="card">
Travel together ✈️<br>
Late night drives 🌙<br>
Watch anime together 🎬<br>
Grow together forever 💖<br>
Get married 💍
</div>
</section>

<!-- LETTER -->
<section>
<h2>💌 A Letter for Pavani</h2>
<div class="card" onclick="startLetter()">
<div id="text"></div><span class="cursor"></span>
</div>
</section>

<!-- TIME -->
<section>
<h2>⏳ Time</h2>
<div class="card" id="time"></div>
</section>

<!-- VIEWER -->
<div id="viewer" onclick="this.style.display='none'">
<img id="viewerImg">
</div>

<script>

/* LOCK */
function unlock(){
  if(document.getElementById("password").value==="2209"){
    document.getElementById("lockScreen").style.display="none";
  }else{
    alert("Wrong password 💔");
  }
}

/* VIEWER */
function openViewer(img){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=img.src;
}

/* HEARTS */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},1000);

/* TIME */
const start=new Date("2020-05-09");
setInterval(()=>{
  const d=Math.floor((new Date()-start)/(1000*60*60*24));
  document.getElementById("time").innerText=d+" days 💖";
},1000);

/* LETTER */
const message = `hie pandu dhanaa,

I don’t really know how to express myself perfectly, but I want you to understand what I feel.

We’ve been together for so long 💖

Take care always 🫂

I love you ❤️`;

let letterIndex = 0;
let started = false;

function startLetter(){
  if(started) return;
  started = true;

  const el = document.getElementById("text");
  el.innerHTML = "";

  function type(){
    if(letterIndex < message.length){
      el.innerHTML += message.charAt(letterIndex) === "\n" ? "<br>" : message.charAt(letterIndex);
      letterIndex++;
      setTimeout(type, 30);
    }
  }

  type();
}

</script>

</body>
</html>
