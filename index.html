<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
  -webkit-overflow-scrolling: touch;
}

/* smooth iOS feel */
html{
  scroll-behavior:smooth;
}

/* 🌌 BACKGROUND PARTICLES */
#particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
}

.particle{
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  filter:blur(2px);
  animation:floatUp 12s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(100vh); opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh); opacity:0;}
}

/* LOCK SCREEN */
#lockScreen{
  position:fixed;
  inset:0;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lockBox{
  padding:30px;
  border-radius:22px;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  background: rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.35);
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.lockBox input{
  padding:10px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  width:200px;
}

.lockBox button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:14px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
}

/* sections */
section{
  padding:40px 20px;
}

/* gallery + movies */
.gallery,.movies{
  display:flex;
  overflow-x:auto;
  gap:20px;
  scroll-snap-type:x mandatory;
  padding:10px;
}

.gallery img,.movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  scroll-snap-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* cards */
.card{
  padding:20px;
  border-radius:22px;
  max-width:400px;
  margin:auto;
  backdrop-filter: blur(35px);
  -webkit-backdrop-filter: blur(35px);
  background: rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 18px 40px rgba(0,0,0,0.15);
}

/* viewer */
#viewer{
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:90%;
  max-height:90%;
  border-radius:20px;
}

/* hearts */
.heart{
  position:fixed;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}

/* cursor */
.cursor::after{
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* MUSIC UI */
.musicGrid{
  display:flex;
  flex-direction:column;
  gap:28px;
  align-items:center;
  padding:25px 10px;
}

.musicCard{
  position:relative;
  width:92%;
  max-width:440px;
  border-radius:32px;
  overflow:hidden;

  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(55px);
  -webkit-backdrop-filter: blur(55px);

  border:1px solid rgba(255,255,255,0.3);

  box-shadow:0 25px 60px rgba(0,0,0,0.22);

  transition:0.35s ease;
}

.musicCard:hover{
  transform: scale(1.03) translateY(-6px);
}

.albumWrap{
  width:100%;
  height:300px;
  overflow:hidden;
}

.album{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
}

.glassOverlay{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.35),rgba(255,255,255,0.05));
  pointer-events:none;
}

.musicCard iframe{
  width:100%;
  height:92px;
  border:none;
}

/* 💌 GIFT */
.giftText{
  padding:20px;
}

/* TIME */
#time{
  font-size:18px;
}
</style>
</head>

<body>

<!-- 🌌 PARTICLES -->
<div id="particles"></div>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lockBox">
    <h2>💖 Enter Password</h2>
    <input type="password" id="password" placeholder="password 🦋">
    <br>
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<section>
<h1>💖 Our World 💖</h1>
</section>

<!-- PHOTOS -->
<section>
<h2>📸 fav clicks</h2>
<div class="gallery">
<img src="photo01.jpg" onclick="openViewer(this)">
<img src="photo02.jpg" onclick="openViewer(this)">
<img src="photo03.jpg" onclick="openViewer(this)">
<img src="photo04.jpg" onclick="openViewer(this)">
<img src="photo05.jpg" onclick="openViewer(this)">
</div>
</section>

<!-- MOVIES -->
<section>
<h2>🎬 comfort Movies</h2>
<div class="movies">
<img src="movie01.jpg">
<img src="movie02.jpg">
<img src="movie03.jpg">
<img src="movie04.jpg">
<img src="movie05.jpg">
</div>
</section>

<!-- MUSIC -->
<section>
<h2>🎵 Our Music</h2>

<div class="musicGrid">

  <div class="musicCard">
    <div class="albumWrap"><img class="album" src="photo01.jpg"></div>
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/3vCzLB6kS2lGcIpm1OOUsy"></iframe>
  </div>

  <div class="musicCard">
    <div class="albumWrap"><img class="album" src="photo02.jpg"></div>
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/6lanRgr6wXibZr8KgzXxBl"></iframe>
  </div>

  <div class="musicCard">
    <div class="albumWrap"><img class="album" src="photo03.jpg"></div>
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/3hB9lDLyAClYVZivMMl20N"></iframe>
  </div>

  <div class="musicCard">
    <div class="albumWrap"><img class="album" src="photo04.jpg"></div>
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/7FwYs4qSJCJi2Hd6ZV8Q3M"></iframe>
  </div>

  <div class="musicCard">
    <div class="albumWrap"><img class="album" src="photo05.jpg"></div>
    <div class="glassOverlay"></div>
    <iframe src="https://open.spotify.com/embed/track/4QNSMIeCknaH5m0EM2yNTI"></iframe>
  </div>

</div>
</section>

<!-- FUTURE -->
<section>
<h2>📅 Future Plans</h2>
<div class="card">
Travel together ✈️<br>
Late night drives 🌙<br>
Watch anime 🎬<br>
Grow together 💖<br>
Get married 💍
</div>
</section>

<!-- 💌 LETTER -->
<section>
<h2>💌 A Letter</h2>
<div class="card" onclick="startLetter()">
<div id="gift">🎁 Tap to Open Gift</div>
<div id="text" class="giftText"></div>
<span class="cursor"></span>
</div>
</section>

<!-- TIME -->
<section>
<h2>⏳ Time</h2>
<div class="card" id="time"></div>
</section>

<!-- VIEWER -->
<div id="viewer" onclick="this.style.display='none'">
<img id="viewerImg">
</div>

<script>

/* LOCK */
function unlock(){
  if(document.getElementById("password").value==="2209"){
    document.getElementById("lockScreen").style.display="none";
  }else alert("Wrong 💔");
}

/* ENTER KEY */
document.getElementById("password").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") unlock();
});

/* VIEWER */
function openViewer(img){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=img.src;
}

/* HEARTS */
setInterval(()=>{
  if(document.hidden) return;
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},1200);

/* TIME */
const start=new Date("2020-05-09");
setInterval(()=>{
  const d=Math.floor((new Date()-start)/(1000*60*60*24));
  document.getElementById("time").innerText=d+" days 💖";
},1000);

/* LETTER */
const msg=`hie pandu dhanaa,

I love you ❤️`;

let i=0, started=false;

function startLetter(){
  if(started) return;
  started=true;

  document.getElementById("gift").style.display="none";
  const el=document.getElementById("text");

  function type(){
    if(i<msg.length){
      el.innerHTML += msg[i]==="\n"?"<br>":msg[i];
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

/* PARTICLES */
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.getElementById("particles").appendChild(p);
}

</script>

</body>
</html>
