<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
}

/* 🔓 LOCK SCREEN */
#lockScreen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lockBox{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.lockBox input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  width:200px;
}

.lockBox button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:15px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
}

/* typing text */
#typing{
  font-size:18px;
  margin-bottom:10px;
}

/* sections */
section{
  padding:40px 20px;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.gallery,.movies{
  display:flex;
  overflow-x:auto;
  gap:20px;
}

.gallery img,.movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  cursor:pointer;
}

.music{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.card{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
}

/* viewer */
#viewer{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:90%;
  max-height:90%;
}

/* hearts */
.heart{
  position:fixed;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<!-- 🔓 LOCK SCREEN -->
<div id="lockScreen">
  <div class="lockBox">
    <div id="typing"></div>
    <input type="password" id="password" placeholder="Password ❤️">
    <br>
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<section>
<h1>💖 Our World 💖</h1>
</section>

<section>
<h2>📸 Memories</h2>
<div class="gallery">
<img src="photo01.jpg" onclick="openViewer(this)">
<img src="photo02.jpg" onclick="openViewer(this)">
<img src="photo03.jpg" onclick="openViewer(this)">
<img src="photo04.jpg" onclick="openViewer(this)">
<img src="photo05.jpg" onclick="openViewer(this)">
<img src="photo06.jpg" onclick="openViewer(this)">
<img src="photo07.jpg" onclick="openViewer(this)">
<img src="photo08.jpg" onclick="openViewer(this)">
<img src="photo09.jpg" onclick="openViewer(this)">
</div>
</section>

<section>
<h2>🎬 Movies</h2>
<div class="movies">
<img src="movie01.jpg" onclick="openViewer(this)">
<img src="movie02.jpg" onclick="openViewer(this)">
<img src="movie03.jpg" onclick="openViewer(this)">
<img src="movie04.jpg" onclick="openViewer(this)">
<img src="movie05.jpg" onclick="openViewer(this)">
<img src="movie06.jpg" onclick="openViewer(this)">
<img src="movie07.jpg" onclick="openViewer(this)">
<img src="movie08.jpg" onclick="openViewer(this)">
<img src="movie09.jpg" onclick="openViewer(this)">
</div>
</section>

<section>
<h2>🎵 Songs</h2>
<div class="music">

<iframe src="https://open.spotify.com/embed/track/3hB9lDLyAClYVZivMMl20N" width="300" height="80"></iframe>

<iframe src="https://open.spotify.com/embed/track/7FwYs4qSJCJi2Hd6ZV8Q3M" width="300" height="80"></iframe>

<iframe src="https://open.spotify.com/embed/track/1nH2PkJL1XoUq8oE6tBZoU" width="300" height="80"></iframe>

<iframe src="https://open.spotify.com/embed/track/2VxeLyX666F8uXCJ0dZF8B" width="300" height="80"></iframe>

</div>
</section>

<section>
<h2>📝 Future Plans</h2>
<div class="card">
Travel together ✈️<br>
Late night drives <br>
Watch one piece together 🎬<br>
Grow together forever<br>
Get married and more and more 💕
</div>
</section>

<section>
<h2>⏳ Time</h2>
<div class="card" id="time"></div>
</section>

<div id="viewer" onclick="this.style.display='none'">
<img id="viewerImg">
</div>

<script>
/* unlock */
function unlock(){
  if(document.getElementById("password").value==="pvniirishii"){
    document.getElementById("lockScreen").style.display="none";
  }else{
    alert("Wrong password 💔");
  }
}

/* typing */
const text="Hehehe hie pavanii😗";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,80);
  }
}
type();

/* viewer */
function openViewer(img){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=img.src;
}

/* hearts */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},1000);

/* time */
const start=new Date("2023-01-01");
setInterval(()=>{
  const d=Math.floor((new Date()-start)/(1000*60*60*24));
  document.getElementById("time").innerText=d+" days 💖";
},1000);
</script>

</body>
</html>
