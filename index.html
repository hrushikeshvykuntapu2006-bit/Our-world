<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow-x:hidden;
  transition:0.3s;
}

/* DARK MODE */
.dark{
  background:#111;
  color:white;
}

/* LOCK */
#lockScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:999;
}

/* MAIN */
#main{display:none;}

section{
  padding:40px 20px;
  text-align:center;
}

/* SCROLL */
.gallery, .movies{
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:10px;
}

/* PORTRAIT */
img{
  flex:0 0 auto;
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  transition:0.3s;
}

/* ZOOM */
img:hover{transform:scale(1.08);}

/* CARD */
.card{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  margin:10px auto;
  max-width:400px;
}

/* FULLSCREEN IMAGE */
#viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img{
  width:90%;
  height:auto;
}

/* GIFT MESSAGE */
#giftMsg{
  display:none;
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:15px;
}

/* HEART */
.heart{
  position:fixed;
  animation:float 4s linear;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);}
}
</style>
</head>

<body onclick="heartBurst(event)">

<!-- LOCK -->
<div id="lockScreen">
  <h2>🔒 Password</h2>
  <input type="password" id="pass">
  <button onclick="unlock()">Unlock 💖</button>
</div>

<!-- VIEWER -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewImg">
</div>

<!-- GIFT -->
<div id="giftMsg">I love you forever 🫂</div>

<!-- MAIN -->
<div id="main">

<button onclick="toggleDark()">🌙</button>

<section>
<h1> 🩷 Our World 🩷 </h1>
</section>

<section>
<h2>📸 Memories</h2>
<div class="gallery">
<img src="photo01.jpg" onclick="openViewer(this.src)">
<img src="photo02.jpg" onclick="openViewer(this.src)">
<img src="photo03.jpg" onclick="openViewer(this.src)">
</div>
</section>

<section>
<h2>🎬 Movies</h2>
<div class="movies">
<img src="movie01.jpg" onclick="openViewer(this.src)">
<img src="movie02.jpg" onclick="openViewer(this.src)">
<img src="movie03.jpg" onclick="openViewer(this.src)">
<img src="movie04.jpg" onclick="openViewer(this.src)">
</div>
</section>

<section>
<h2>💌 For You</h2>
<div class="card">You are my everything 💖</div>
</section>

<section>
<h2>⏳ Our time together</h2>
<div class="card" id="time"></div>
</section>

<section>
<h2>🎁 Surprise</h2>
<div class="card">
<button onclick="gift()">Open 🎀</button>
</div>
</section>

</div>

<!-- MUSIC -->
<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav">
</audio>

<script>

// PASSWORD
function unlock(){
  if(document.getElementById("pass").value==="2209"){
    lockScreen.style.display="none";
    main.style.display="block";
  }else alert("Wrong password");
}

// TIME
const startDate=new Date("2020-05-13");
setInterval(()=>{
  const diff=new Date()-startDate;
  document.getElementById("time").innerText=
  Math.floor(diff/(1000*60*60*24))+" days 💖";
},1000);

// GIFT
function gift(){
  giftMsg.style.display="block";
  setTimeout(()=>giftMsg.style.display="none",3000);
}

// VIEWER
function openViewer(src){
  viewer.style.display="flex";
  viewImg.src=src;
}
function closeViewer(){
  viewer.style.display="none";
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// HEART BURST
function heartBurst(e){
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
}

</script>

</body>
</html>
