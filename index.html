<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World 💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#e0c3fc);
  text-align:center;
  color:#333;
  overflow-x:hidden;
}

/* LOCK */
#lockScreen{
  position:fixed;
  inset:0;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lockBox{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.lockBox input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  width:200px;
}

.lockBox button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:15px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
}

/* sections */
section{
  padding:40px 20px;
}

.gallery,.movies{
  display:flex;
  overflow-x:auto;
  gap:20px;
}

.gallery img,.movies img{
  width:160px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  cursor:pointer;
}

/* card */
.card{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
}

/* viewer */
#viewer{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:90%;
  max-height:90%;
}

/* hearts */
.heart{
  position:fixed;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}

/* typing cursor */
.cursor::after{
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lockBox">
    <h2>💖 Enter Password</h2>
    <input type="password" id="password" placeholder="password 🩵">
    <br>
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<section>
<h1>💖 Our World 💖</h1>
</section>

<section>
<h2>📸 fav clicks</h2>
<div class="gallery">
<img src="photo01.jpg" onclick="openViewer(this)">
<img src="photo02.jpg" onclick="openViewer(this)">
<img src="photo03.jpg" onclick="openViewer(this)">
<img src="photo04.jpg" onclick="openViewer(this)">
<img src="photo05.jpg" onclick="openViewer(this)">
<img src="photo06.jpg" onclick="openViewer(this)">
<img src="photo07.jpg" onclick="openViewer(this)">
<img src="photo08.jpg" onclick="openViewer(this)">
<img src="photo09.jpg" onclick="openViewer(this)">
</div>
</section>

<section>
<h2>🎬 comfort Movies</h2>
<div class="movies">
<img src="movie01.jpg" onclick="openViewer(this)">
<img src="movie02.jpg" onclick="openViewer(this)">
<img src="movie03.jpg" onclick="openViewer(this)">
<img src="movie04.jpg" onclick="openViewer(this)">
<img src="movie05.jpg" onclick="openViewer(this)">
<img src="movie06.jpg" onclick="openViewer(this)"> 
<img src="movie07.jpg" onclick="openViewer(this)">
<img src="movie08.jpg" onclick="openViewer(this)">
<img src="movie09.jpg" onclick="openViewer(this)">
</div>
</section>

<section>
<h2>🎵 Songs</h2>
<div class="card">
<iframe src="https://open.spotify.com/embed/track/3hB9lDLyAClYVZivMMl20N" width="100%" height="80"></iframe>
<iframe src="https://open.spotify.com/embed/track/7FwYs4qSJCJi2Hd6ZV8Q3M" width="100%" height="80"></iframe>
</div>
</section>

<section>
<h2>📅 Future Plans</h2>
<div class="card">
Travel together ✈️<br>
Late night drives 🌙<br>
Watch anime together 🎬<br>
Grow together forever 💖<br>
Get married 💍
</div>
</section>

<!-- LETTER -->
<section>
<h2>💌 A Letter for Pavani</h2>
<div class="card" onclick="startLetter()">
<div id="text"></div><span class="cursor"></span>
</div>
</section>

<section>
<h2>⏳ Time</h2>
<div class="card" id="time"></div>
</section>

<!-- VIEWER -->
<div id="viewer" onclick="this.style.display='none'">
<img id="viewerImg">
</div>

<script>

/* PASSWORD */
function unlock(){
  if(document.getElementById("password").value==="2209"){
    document.getElementById("lockScreen").style.display="none";
  }else{
    alert("Wrong password 💔");
  }
}

/* VIEWER */
function openViewer(img){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=img.src;
}

/* HEARTS */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},1000);

/* TIME */
const start=new Date("2020-05-09");
setInterval(()=>{
  const d=Math.floor((new Date()-start)/(1000*60*60*24));
  document.getElementById("time").innerText=d+" days 💖";
},1000);

/* LETTER TYPEWRITER */
const message = `hie pandu dhanaa,

I don’t really know how to express myself perfectly, but I want you to understand what I feel.

We’ve been together for so long, and still we’re here holding each other 💖

Don’t overthink too much, take care of your health 🫂

I love you always ❤️`;

let letterIndex = 0;
let started = false;

function startLetter(){
  if(started) return;
  started = true;

  const el = document.getElementById("text");
  el.innerHTML = "";

  function type(){
    if(letterIndex < message.length){
      el.innerHTML += message.charAt(letterIndex) === "\n" ? "<br>" : message.charAt(letterIndex);
      letterIndex++;
      setTimeout(type, 30);
    }
  }

  type();
}

</script>

</body>
</html>
